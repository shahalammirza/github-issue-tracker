<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title -->
    <title>Login Page</title>

    <!-- Favicon icon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- CSS Link -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google fonts links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisyUI and Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="bg-[#F8FAFC] h-[100vh]">
        <section class="pt-[78px]">
            <div class="login_container max-w-[520px] mx-auto rounded-lg bg-white shadow-md p-[32px]">
                <!-- top part -->
                <div class="login_top_content text-center">
                    <div class="text-center w-[100px] mx-auto">
                        <img class="w-[100px]" src="assets/github-logo.png" alt="">
                    </div>
                    <h4 class="text-[24px] font-semibold text-[#1F2937] mt-[24px]">GitHub Issues Tracker</h4>
                    <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
                </div>
                <!-- middle part -->
                <form>
                    <div class="input_box mt-[24px]">
                        <label id="name" class="text-[16px] text-[#1F2937] font-medium">Username</label>
                        <input required id="username" for="name" class="focus:border-[#E4E4E7] outline-none h-[48px] w-full rounded-[8px] p-[16px] mt-[8px] mb-[5px] border-[#E4E4E7]" type="text" placeholder="Enter Username">
                        <span class="text-[14px] text-[#4A00FF]">Default: admin</span>
                    </div>
                    <div class="input_box mt-[16px]">
                        <label id="password" class="text-[16px] text-[#1F2937] font-medium">Password</label>
                        <input required id="pinNumber" for="password" class="focus:border-[#E4E4E7] outline-none h-[48px] w-full rounded-[8px] p-[16px] mt-[8px] mb-[5px] border-[#E4E4E7]" type="password" placeholder="Enter Password">
                        <span class="text-[14px] text-[#4A00FF]">Default: admin123</span>
                    </div>
                    <button id="loginbtn" class="btn bg-[#4A00FF] w-full h-[48px] mt-6 rounded-lg p-[16px] text-[16px] text-white font-semibold">Sign In</button>
                </form>
                <div class="divider"><span class="text-[#1F2937] text-[16px]">OR</span></div>
                <!-- last part -->
                <div class="demo_credentials text-center">
                    <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
                    <div class="logInfo p-6 bg-[#F8FAFC] rounded-lg mt-2">
                        <p class="text-[16px] text-[#1F2937]"><span class="font-semibold">Username:</span> admin</p>
                        <p class="text-[16px] text-[#1F2937]"><span class="font-semibold">Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </section>
    </main>



    <!-- javascript Links -->
    <script src="js/login.js"></script>
</body>
</html>
